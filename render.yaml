services:
  - type: worker
    name: wingo-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false        # you fill this in Render dashboard
      - key: MONGO_URI
        sync: false        # you fill this in Render dashboard
      - key: API_TOKEN
        sync: false        # optional — leave blank if not using
      - key: PORT
        value: 8080
    healthCheckPath: /